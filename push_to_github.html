const REPO = "VinupaHelitha/investsmart";
const BRANCH = "main";
const MSG = "fix: replace yfinance CSE data with direct CSE WebSocket live feed";

document.getElementById('status').textContent = 
  'Loaded: ' + B64.length + ' chars. Ready to push.';

async function doPush() {
  const btn = document.getElementById('btn');
  const st = document.getElementById('status');
  btn.disabled = true;
  btn.textContent = 'Pushing...';
  st.className = '';
  st.textContent = 'Connecting to GitHub API...';
  
  try {
    const url = 'https://api.github.com/repos/' + REPO + '/contents/app.py';
    st.textContent = 'Making PUT request to: ' + url;
    
    const res = await fetch(url, {
      method: 'PUT',
      headers: {
        'Authorization': 'token ' + TOKEN,
        'Accept': 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        message: MSG,
        content: B64,
        sha: SHA,
        branch: BRANCH
      })
    });
    
    const data = await res.json();
    
    if (res.ok) {
      st.className = 'ok';
      st.textContent = '✅ SUCCESS!\n\nHTTP Status: ' + res.status + 
        '\nCommit SHA: ' + (data.commit && data.commit.sha || 'N/A') +
        '\nCommit URL: ' + (data.commit && data.commit.html_url || 'N/A');
      btn.textContent = '✅ Done!';
    } else {
      st.className = 'err';
      st.textContent = '❌ FAILED\nHTTP: ' + res.status + 
        '\nMessage: ' + (data.message || JSON.stringify(data));
      btn.disabled = false;
      btn.textContent = '▶ Retry';
    }
  } catch(err) {
    st.className = 'err';
    st.textContent = '❌ ERROR: ' + err.message + 
      '\n\nIf this is a CORS error, try opening this file via a local web server.';
    btn.disabled = false;
    btn.textContent = '▶ Retry';
  }
}
