<body>
<div id="log">Initializing...\n</div>
<script>
window._appB64 = "";
const log = s => { document.getElementById('log').textContent += s+'\n'; console.log(s); };
</script>
<script src="inject0.js"></script>

<script>
log('After inject8: _appB64.length=' + window._appB64.length);

const TOKEN = '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';
const REPO  = 'VinupaHelitha/investsmart';
const PATH  = 'app.py';

async function push() {
  const total = window._appB64.length;
  if (total !== 143156) {
    log('ERROR: expected 143156 chars, got ' + total + '. Aborting.');
    return;
  }
  log('\nFetching current SHA from GitHub...');
  try {
    const mr = await fetch('https://api.github.com/repos/'+REPO+'/contents/'+PATH, {
      headers: {'Authorization': 'token '+TOKEN, 'Accept': 'application/vnd.github.v3+json'}
    });
    if (!mr.ok) { log('ERROR getting SHA: '+mr.status); return; }
    const meta = await mr.json();
    const sha = meta.sha;
    log('Got SHA: ' + sha);

    log('\nPushing app.py...');
    const pr = await fetch('https://api.github.com/repos/'+REPO+'/contents/'+PATH, {
      method: 'PUT',
      headers: {
        'Authorization': 'token '+TOKEN,
        'Accept': 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        message: 'fix: replace yfinance CSE data with direct CSE WebSocket live feed',
        content: window._appB64,
        sha: sha,
        branch: 'main'
      })
    });
    const j = await pr.json();
    log('Push status: ' + pr.status);
    log('Commit SHA: ' + (j?.commit?.sha || 'N/A'));
    if (pr.status === 200 || pr.status === 201) {
      log('\nSUCCESS! Streamlit Cloud redeploying...');
      document.getElementById('log').style.color = '#00ff88';
    } else {
      log('\nFAILED: ' + JSON.stringify(j).slice(0,300));
    }
  } catch(e) {
    log('EXCEPTION: ' + e);
  }
}
push();
</script>
</body>
</html>
