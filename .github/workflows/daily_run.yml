name: InvestSmart Daily Data Collection

# Runs on weekdays at:
# - 09:30 UTC = 3:00 PM Sri Lanka (UTC+5:30) → collect market data at market close
# - 10:00 UTC = 3:30 PM Sri Lanka           → generate AI briefing

on:
  schedule:
    - cron: "30 9 * * 1-5"    # 3:00 PM Sri Lanka — collect data
    - cron: "0 10 * * 1-5"    # 3:30 PM Sri Lanka — generate briefing
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  collect-data:
    runs-on: ubuntu-latest
    if: github.event.schedule == '30 9 * * 1-5' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Run data collector
        env:
          FRED_API_KEY:       ${{ secrets.FRED_API_KEY }}
          NEWS_API_KEY:       ${{ secrets.NEWS_API_KEY }}
          SUPABASE_URL:       ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:       ${{ secrets.SUPABASE_KEY }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:     ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          NEO4J_URI:          ${{ secrets.NEO4J_URI }}
          NEO4J_USERNAME:     ${{ secrets.NEO4J_USERNAME }}
          NEO4J_PASSWORD:     ${{ secrets.NEO4J_PASSWORD }}
        run: python data_collector.py

  generate-briefing:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 10 * * 1-5' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Generate AI briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          FRED_API_KEY:      ${{ secrets.FRED_API_KEY }}
          NEWS_API_KEY:      ${{ secrets.NEWS_API_KEY }}
          SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:      ${{ secrets.SUPABASE_KEY }}
          NEO4J_URI:         ${{ secrets.NEO4J_URI }}
          NEO4J_USERNAME:    ${{ secrets.NEO4J_USERNAME }}
          NEO4J_PASSWORD:    ${{ secrets.NEO4J_PASSWORD }}
        run: python briefing_generator.py
